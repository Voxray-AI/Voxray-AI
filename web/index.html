<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Assistant · WebRTC Client</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: #e5e7eb;
        background:
          radial-gradient(circle at top left, #0f172a 0, #020617 40%, #000 100%),
          radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.6), transparent 60%);
        display: flex;
        justify-content: center;
        align-items: stretch;
        padding: 24px;
      }

      body[data-state="connecting"] {
        cursor: progress;
      }

      .app {
        width: 100%;
        max-width: 980px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        padding: 32px 20px 80px;
        background: radial-gradient(circle at 0 0, #111827 0, #020617 55%, #000 100%);
        box-shadow:
          0 24px 60px rgba(15, 23, 42, 0.95),
          0 0 0 1px rgba(148, 163, 184, 0.12);
      }

      .hero-inner {
        position: relative;
        z-index: 1;
        max-width: 640px;
        margin: 0 auto;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .hero-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #9ca3af;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 40px);
        letter-spacing: 0.08em;
      }

      .hero-subtitle {
        margin: 0;
        max-width: 440px;
        color: #9ca3af;
        font-size: 14px;
      }

      .voice-pipeline {
        margin: 0;
        font-size: 12px;
        color: #6b7280;
      }

      .mic-button {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
        margin-top: 10px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: radial-gradient(circle at 30% 10%, #f97316, transparent 55%),
          radial-gradient(circle at 70% 80%, #22d3ee, transparent 55%),
          #020617;
        color: #f9fafb;
        cursor: pointer;
        box-shadow:
          0 0 0 1px rgba(15, 23, 42, 0.8),
          0 18px 45px rgba(15, 23, 42, 0.9);
        transition:
          transform 0.15s ease-out,
          box-shadow 0.2s ease-out,
          border-color 0.15s ease-out;
      }

      .mic-button:hover {
        transform: translateY(-2px);
        box-shadow:
          0 0 0 1px rgba(56, 189, 248, 0.6),
          0 22px 60px rgba(8, 47, 73, 0.95);
        border-color: rgba(56, 189, 248, 0.9);
      }

      .mic-button:focus-visible {
        outline: 2px solid #38bdf8;
        outline-offset: 4px;
      }

      .mic-button--active {
        box-shadow:
          0 0 0 1px rgba(56, 189, 248, 0.7),
          0 0 35px rgba(56, 189, 248, 0.8);
        border-color: rgba(56, 189, 248, 0.9);
      }

      @media (prefers-reduced-motion: no-preference) {
        body[data-state="connecting"] .mic-button,
        body[data-state="connected"] .mic-button {
          animation: micPulse 1.4s ease-in-out infinite;
        }
      }

      .mic-icon {
        width: 34px;
        height: 34px;
      }

      .mic-icon svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .mic-hint {
        margin: 10px 0 0;
        font-size: 12px;
        color: #9ca3af;
      }

      .hero-status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        font-size: 12px;
      }

      .status-label {
        color: #6b7280;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .hero-settings {
        margin-top: 18px;
        justify-content: center;
      }

      label {
        font-size: 12px;
        color: #9ca3af;
      }

      input {
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        min-width: min(320px, 100%);
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
      }

      input::placeholder {
        color: #6b7280;
      }

      input:focus-visible {
        outline: 2px solid #38bdf8;
        outline-offset: 2px;
      }

      button {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        cursor: pointer;
        font-size: 14px;
      }

      button[disabled] {
        opacity: 0.55;
        cursor: default;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 3px 12px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: rgba(15, 23, 42, 0.9);
      }

      body[data-state="connecting"] .pill {
        border-color: rgba(251, 191, 36, 0.9);
        color: #fbbf24;
      }

      body[data-state="connected"] .pill {
        border-color: rgba(34, 197, 94, 0.9);
        color: #4ade80;
      }

      .muted {
        opacity: 0.8;
      }

      .card {
        border-radius: 18px;
        padding: 18px 18px 16px;
        margin-top: 4px;
        background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.9));
        border: 1px solid rgba(31, 41, 55, 0.9);
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.95);
      }

      .controls-row {
        justify-content: flex-start;
        gap: 8px;
        margin-bottom: 10px;
      }

      .controls-help {
        font-size: 11px;
        color: #6b7280;
      }

      .log-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #6b7280;
        margin-bottom: 4px;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        max-height: 220px;
        overflow-y: auto;
        padding: 10px 0 0;
        margin: 0;
        border-top: 1px solid rgba(31, 41, 55, 0.9);
      }

      audio {
        margin-top: 10px;
        width: 100%;
      }

      .voice-wave-visualizer {
        margin-top: 16px;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(31, 41, 55, 0.9);
        background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.9));
      }

      .hero-wave-wrapper {
        position: absolute;
        inset-inline: -40px;
        bottom: -40px;
        height: 220px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        pointer-events: none;
        opacity: 0.9;
      }

      .voice-wave-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #6b7280;
        margin-bottom: 6px;
      }

      .voice-wave-canvas {
        display: block;
        width: 100%;
        height: 68px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 0 0, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.9)),
          radial-gradient(circle at 100% 100%, rgba(8, 47, 73, 0.8), rgba(15, 23, 42, 0.9));
        box-shadow:
          inset 0 0 0 1px rgba(15, 23, 42, 0.9),
          0 0 40px rgba(56, 189, 248, 0.12);
      }

      .hero .voice-wave-canvas {
        max-width: 720px;
        height: 120px;
        box-shadow:
          inset 0 0 0 1px rgba(15, 23, 42, 0.9),
          0 0 55px rgba(56, 189, 248, 0.24);
      }

      .wave-container {
        position: absolute;
        inset-inline: -40px;
        bottom: -80px;
        height: 200px;
        pointer-events: none;
        opacity: 0.85;
      }

      .wave {
        position: absolute;
        width: 200%;
        height: 200%;
        border-radius: 45%;
        filter: blur(6px);
        opacity: 0.4;
      }

      .wave.wave-1 {
        background: linear-gradient(90deg, #f97316, #facc15, #22c55e);
        animation: waveDrift1 16s linear infinite;
      }

      .wave.wave-2 {
        background: linear-gradient(90deg, #22c55e, #22d3ee, #60a5fa);
        animation: waveDrift2 20s linear infinite;
        opacity: 0.45;
      }

      .wave.wave-3 {
        background: linear-gradient(90deg, #6366f1, #ec4899, #f97316);
        animation: waveDrift3 22s linear infinite;
        opacity: 0.35;
      }

      @keyframes micPulse {
        0% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-3px) scale(1.04);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }

      @keyframes waveDrift1 {
        0% {
          transform: translateX(-20%) translateY(0) rotate(0deg);
        }
        100% {
          transform: translateX(-60%) translateY(-6%) rotate(360deg);
        }
      }

      @keyframes waveDrift2 {
        0% {
          transform: translateX(-40%) translateY(-8%) rotate(0deg);
        }
        100% {
          transform: translateX(-10%) translateY(6%) rotate(-360deg);
        }
      }

      @keyframes waveDrift3 {
        0% {
          transform: translateX(-30%) translateY(6%) rotate(0deg);
        }
        100% {
          transform: translateX(-70%) translateY(-4%) rotate(360deg);
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .hero {
          padding-inline: 16px;
        }

        .hero-settings {
          align-items: stretch;
        }

        input {
          min-width: 0;
          flex: 1 1 100%;
        }

        .hero-wave-wrapper {
          inset-inline: -24px;
          bottom: -24px;
          height: 180px;
        }

        .hero .voice-wave-canvas {
          height: 96px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section class="hero" aria-labelledby="heroTitle" aria-describedby="heroSubtitle">
        <div class="hero-inner">
          <div class="hero-label">WebRTC Voice Client</div>
          <h1 id="heroTitle">Voxray AI</h1>
          <p id="heroSubtitle" class="hero-subtitle">
            Talk to your AI assistant with low-latency, full-duplex WebRTC audio.
          </p>
          <p class="voice-pipeline">Pipeline: mic → STT → LLM → TTS → speaker.</p>

          <button
            id="micButton"
            type="button"
            class="mic-button"
            aria-label="Toggle microphone for the voice assistant"
            aria-pressed="false"
          >
            <span class="mic-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                <path
                  fill="currentColor"
                  d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Zm0 18a4.5 4.5 0 0 0 4.5-4.5a1 1 0 0 0-2 0a2.5 2.5 0 0 1-5 0a1 1 0 0 0-2 0A4.5 4.5 0 0 0 12 21Zm-7-9a1 1 0 0 1 1 1a6 6 0 0 0 12 0a1 1 0 1 1 2 0a8 8 0 0 1-7 7.93V22a1 1 0 0 1-2 0v-1.07A8 8 0 0 1 4 13a1 1 0 0 1 1-1Z"
                />
              </svg>
            </span>
          </button>

          <p id="micHint" class="mic-hint">
            Click the mic and allow access in your browser to begin.
          </p>

          <div class="hero-status-row">
            <span id="status" class="pill" aria-live="polite">idle</span>
            <span class="status-label">Connection status</span>
          </div>

          <div class="hero-settings row">
            <label class="muted" for="baseUrl">Backend URL (optional)</label>
            <input
              id="baseUrl"
              value=""
              placeholder="Leave blank for same origin"
              aria-label="Backend URL (leave blank for same origin)"
            />
          </div>
        </div>

            <div class="hero-wave-wrapper" aria-label="Assistant voice activity" role="img">
              <canvas id="voiceWaveCanvas" class="voice-wave-canvas"></canvas>
            </div>

        <div class="wave-container" aria-hidden="true">
          <div class="wave wave-1"></div>
          <div class="wave wave-2"></div>
          <div class="wave wave-3"></div>
        </div>
      </section>

      <section class="card" aria-label="Connection controls and event log">
        <div class="row controls-row">
          <button id="connectBtn" aria-label="Connect to voice backend">Connect</button>
          <button id="disconnectBtn" disabled aria-label="Disconnect from voice backend">Disconnect</button>
          <span class="controls-help">Use these if the main mic button is unavailable.</span>
        </div>

          <div class="log-title">Log</div>
          <pre id="log" class="muted"></pre>

        <audio id="remoteAudio" autoplay playsinline></audio>
      </section>
    </div>

    <script>
      const el = (id) => document.getElementById(id);
      const logEl = el("log");
      const statusEl = el("status");
      const connectBtn = el("connectBtn");
      const disconnectBtn = el("disconnectBtn");
      const baseUrlInput = el("baseUrl");
      const remoteAudio = el("remoteAudio");
      const micButton = el("micButton");
      const micHint = el("micHint");
      const voiceWaveCanvas = el("voiceWaveCanvas");

      let audioContext = null;
      let analyser = null;
      let analyserDataArray = null;
      let waveAnimationId = null;
      let waveSourceNode = null;
      let waveCanvasCtx = null;
      let waveResizeAttached = false;

      document.body.dataset.state = "idle";

      function setStatus(s) {
        statusEl.textContent = s;
        const text = (s || "").toLowerCase();
        let state = "idle";
        if (text === "connected") {
          state = "connected";
        } else if (text.includes("connect") || text.includes("microphone")) {
          state = "connecting";
        }
        document.body.dataset.state = state;
        if (micButton) {
          const active = state === "connected" || state === "connecting";
          micButton.classList.toggle("mic-button--active", active);
          micButton.setAttribute("aria-pressed", String(active));
        }
      }

      function resizeWaveCanvas() {
        if (!voiceWaveCanvas) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = voiceWaveCanvas.getBoundingClientRect();
        const width = rect.width || voiceWaveCanvas.clientWidth || 0;
        const height = rect.height || voiceWaveCanvas.clientHeight || 0;
        if (!width || !height) return;
        const displayWidth = width * dpr;
        const displayHeight = height * dpr;
        if (voiceWaveCanvas.width !== displayWidth || voiceWaveCanvas.height !== displayHeight) {
          voiceWaveCanvas.width = displayWidth;
          voiceWaveCanvas.height = displayHeight;
        }
      }

      function startWaveformVisualizer(stream) {
        if (!voiceWaveCanvas || !stream) return;

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) {
          log("Web Audio API not available; waveform visualization disabled.");
          return;
        }

        if (!audioContext) {
          audioContext = new AudioCtx();
        }
        if (audioContext.state === "suspended") {
          audioContext.resume().catch(() => {});
        }

        if (waveSourceNode) {
          try {
            waveSourceNode.disconnect();
          } catch (e) {
            // ignore
          }
          waveSourceNode = null;
        }

        if (!analyser) {
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 2048;
          analyser.smoothingTimeConstant = 0.85;
        }

        waveSourceNode = audioContext.createMediaStreamSource(stream);
        waveSourceNode.connect(analyser);

        const bufferLength = analyser.fftSize;
        analyserDataArray = new Uint8Array(bufferLength);

        waveCanvasCtx = voiceWaveCanvas.getContext("2d");
        if (!waveCanvasCtx) return;

        resizeWaveCanvas();
        if (!waveResizeAttached) {
          window.addEventListener("resize", resizeWaveCanvas);
          waveResizeAttached = true;
        }

        if (waveAnimationId) {
          cancelAnimationFrame(waveAnimationId);
          waveAnimationId = null;
        }

        const draw = () => {
          if (!analyser || !waveCanvasCtx) return;
          waveAnimationId = requestAnimationFrame(draw);

          analyser.getByteTimeDomainData(analyserDataArray);

          const width = voiceWaveCanvas.width || 0;
          const height = voiceWaveCanvas.height || 0;
          if (!width || !height) return;

          waveCanvasCtx.clearRect(0, 0, width, height);

          const bgGradient = waveCanvasCtx.createLinearGradient(0, 0, width, height);
          bgGradient.addColorStop(0, "rgba(15, 23, 42, 0.9)");
          bgGradient.addColorStop(1, "rgba(8, 47, 73, 0.9)");
          waveCanvasCtx.fillStyle = bgGradient;
          waveCanvasCtx.fillRect(0, 0, width, height);

          const gradient = waveCanvasCtx.createLinearGradient(0, 0, width, 0);
          gradient.addColorStop(0, "#22d3ee");
          gradient.addColorStop(0.5, "#60a5fa");
          gradient.addColorStop(1, "#a855f7");
          waveCanvasCtx.lineWidth = 2 * (window.devicePixelRatio || 1);
          waveCanvasCtx.strokeStyle = gradient;
          waveCanvasCtx.beginPath();

          const sliceWidth = width / analyserDataArray.length;
          let x = 0;
          for (let i = 0; i < analyserDataArray.length; i++) {
            const v = analyserDataArray[i] / 128.0;
            const y = (v * height) / 2;
            if (i === 0) {
              waveCanvasCtx.moveTo(x, y);
            } else {
              waveCanvasCtx.lineTo(x, y);
            }
            x += sliceWidth;
          }
          waveCanvasCtx.stroke();
        };

        draw();
      }

      function stopWaveformVisualizer() {
        if (waveAnimationId) {
          cancelAnimationFrame(waveAnimationId);
          waveAnimationId = null;
        }
        if (waveSourceNode) {
          try {
            waveSourceNode.disconnect();
          } catch (e) {
            // ignore
          }
          waveSourceNode = null;
        }
        if (audioContext && audioContext.state !== "closed") {
          audioContext.suspend().catch(() => {});
        }
        if (voiceWaveCanvas && waveCanvasCtx) {
          waveCanvasCtx.clearRect(0, 0, voiceWaveCanvas.width || 0, voiceWaveCanvas.height || 0);
        }
        if (waveResizeAttached) {
          window.removeEventListener("resize", resizeWaveCanvas);
          waveResizeAttached = false;
        }
      }
      function logTime() {
        const d = new Date();
        return d.toTimeString().slice(0, 12) + "." + String(d.getMilliseconds()).padStart(3, "0");
      }
      function log(...args) {
        const line = "[" + logTime() + "] " + args.map(a => (typeof a === "string" ? a : JSON.stringify(a))).join(" ");
        logEl.textContent = (logEl.textContent + line + "\n").slice(-12000);
      }

      let pc = null;
      let localStream = null;

      async function connect() {
        const baseUrl = baseUrlInput.value.trim().replace(/\/$/, "");
        const offerUrl = (baseUrl ? baseUrl : "") + "/webrtc/offer";
        log("Connecting to", offerUrl || "(same origin)/webrtc/offer");
        setStatus("connecting");

        if (!navigator.mediaDevices || typeof navigator.mediaDevices.getUserMedia !== "function") {
          setStatus("idle");
          log("Microphone API not available. Use HTTPS or localhost.");
          if (micHint) {
            micHint.textContent = "Microphone API not available. Use HTTPS or localhost.";
          }
          return;
        }

        setStatus("Requesting microphone…");
        log("Requesting microphone permission…");
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          setStatus("idle");
          const errName = (e && e.name) || "Unknown";
          const errMsg = (e && e.message) || String(e);
          log("getUserMedia error:", errName, errMsg);
          if (errName === "NotAllowedError" || errName === "PermissionDeniedError") {
            log("Allow microphone in the browser prompt, or check site permissions.");
            if (micHint) {
              micHint.textContent = "Microphone permission blocked. Check your browser site settings.";
            }
          } else if (micHint) {
            micHint.textContent = "Could not access microphone. See log for details.";
          }
          return;
        }
        log("Microphone ready, tracks:", localStream.getTracks().length);

        const isLocal = !baseUrl || /^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?(\/|$)/i.test(baseUrl);
        const iceServers = isLocal ? [] : [{ urls: ["stun:stun.l.google.com:19302"] }];

        pc = new RTCPeerConnection({ iceServers });

        pc.onconnectionstatechange = () => {
          setStatus(pc.connectionState);
          log("pc state:", pc.connectionState);
        };
        pc.oniceconnectionstatechange = () => {
          if (pc.iceConnectionState === "disconnected" || pc.iceConnectionState === "failed" || pc.iceConnectionState === "closed") {
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
          }
        };

        pc.ontrack = (ev) => {
          log("Received remote track:", ev.track?.kind, "id=", ev.track?.id);
          if (ev.streams && ev.streams[0]) {
            remoteAudio.srcObject = ev.streams[0];
            setStatus("connected");
            log("Playing remote audio (TTS).");
            try {
              startWaveformVisualizer(ev.streams[0]);
            } catch (e) {
              log("Waveform visualizer error:", String(e));
            }
          } else {
            log("Remote track has no stream.");
          }
        };

        localStream.getTracks().forEach((track) => {
          pc.addTrack(track, localStream);
        });
        log("Added", localStream.getTracks().length, "track(s) to peer connection.");

        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
        } catch (e) {
          setStatus("idle");
          log("Create offer failed:", e.message || e.name);
          cleanup();
          return;
        }

        if (pc.iceGatheringState !== "complete") {
          const gatheringDone = new Promise((resolve) => {
            let done = false;
            const finish = () => {
              if (done) return;
              done = true;
              pc.removeEventListener("icegatheringstatechange", onComplete);
              resolve();
            };
            const onComplete = () => { if (pc.iceGatheringState === "complete") finish(); };
            pc.addEventListener("icegatheringstatechange", onComplete);
            if (pc.iceGatheringState === "complete") finish();
            else setTimeout(() => { if (pc.iceGatheringState === "complete") finish(); }, 0);
          });
          const timeout = (ms) => new Promise((r) => setTimeout(r, ms));
          await Promise.race([gatheringDone, timeout(5000)]);
        }
        log("Offer created (ICE gathered), sending to server…");

        const resp = await fetch(offerUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ offer: JSON.stringify(pc.localDescription) }),
        });
        if (!resp.ok) {
          const text = await resp.text();
          log("Offer failed:", resp.status, text);
          cleanup();
          throw new Error("Offer failed: " + resp.status + " " + text);
        }
        const data = await resp.json();
        if (!data.answer) {
          log("No answer in response.");
          cleanup();
          throw new Error("No answer in response");
        }
        const answer = typeof data.answer === "string" ? JSON.parse(data.answer) : data.answer;
        log("Answer received, setting remote description…");
        await pc.setRemoteDescription(new RTCSessionDescription(answer));

        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        setStatus(pc.connectionState || "connecting");
        log("Signaling complete. Waiting for ICE and remote track.");
      }

      function cleanup() {
        if (pc) {
          pc.close();
          pc = null;
        }
        if (localStream) {
          localStream.getTracks().forEach((t) => t.stop());
          localStream = null;
        }
        remoteAudio.srcObject = null;
        stopWaveformVisualizer();
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        setStatus("idle");
        if (micHint) {
          micHint.textContent = "Click the mic and allow access in your browser to begin.";
        }
      }

      function disconnect() {
        log("Disconnecting…");
        cleanup();
        log("Disconnected.");
      }

      connectBtn.onclick = async () => {
        connectBtn.disabled = true;
        try {
          setStatus("connecting");
          await connect();
        } catch (e) {
          log("Connect error:", String(e));
          cleanup();
        }
      };
      disconnectBtn.onclick = () => disconnect();

      if (micButton) {
        micButton.addEventListener("click", async () => {
          const state = document.body.dataset.state || "idle";
          if (state === "connected" || state === "connecting") {
            log("Mic button: disconnecting…");
            disconnect();
            return;
          }

          log("Mic button: connecting…");
          if (micHint) {
            micHint.textContent = "Grant microphone permission in your browser to continue.";
          }
          connectBtn.click();
        });
      }
    </script>
  </body>
</html>
